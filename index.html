<!doctype html>

<meta charset="UTF-8">

<title>AIP-C01 — Trắc nghiệm AWS Certified Generative AI Developer</title>
<meta name="description" content="Luyện thi trắc nghiệm AWS Certified Generative AI Developer – Professional (AIP-C01).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0B0D13;
    --bg-2:      #0F1117;
    --surface:   #161925;
    --surface-2: #1C2030;
    --surface-3: #232838;
    --border:    #272C3E;
    --border-2:  #333A52;
    --text:      #F2F4FA;
    --muted:     #9AA3B7;
    --muted-2:   #6B7488;

    --accent:    #6366F1;
    --accent-2:  #818CF8;
    --accent-dim: rgba(99, 102, 241, 0.14);
    --good:      #34D399;
    --good-dim:  rgba(52, 211, 153, 0.14);
    --bad:       #F87171;
    --bad-dim:   rgba(248, 113, 113, 0.14);
    --warn:      #FBBF24;

    --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
    --font-body: 'IBM Plex Sans', -apple-system, 'Segoe UI', system-ui, sans-serif;

    --space-xs: 0.375rem;
    --space-s:  0.75rem;
    --space-m:  1.25rem;
    --space-l:  2rem;
    --space-xl: 3rem;

    --radius:    10px;
    --radius-lg: 16px;
    --radius-xl: 22px;

    --shadow:    0 8px 24px rgba(0,0,0,0.35);
    --shadow-lg: 0 24px 60px rgba(0,0,0,0.5);

    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

  body {
    background:
      radial-gradient(900px 500px at 12% -10%, rgba(99,102,241,0.10), transparent 60%),
      radial-gradient(800px 500px at 100% 0%, rgba(52,211,153,0.06), transparent 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--font-body);
    line-height: 1.6;
    min-height: 100vh;
  }

  ::selection { background: var(--accent-dim); color: var(--text); }

  *:focus-visible {
    outline: 2px solid var(--accent-2);
    outline-offset: 2px;
    border-radius: 4px;
  }

  .icon { width: 1.15em; height: 1.15em; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex: 0 0 auto; }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-m);
    padding: var(--space-s) var(--space-l);
    background: rgba(11, 13, 19, 0.72);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border-bottom: 1px solid var(--border);
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: var(--space-s);
    text-decoration: none;
    color: var(--text);
  }
  .nav-logo {
    width: 34px; height: 34px;
    display: grid; place-items: center;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    box-shadow: 0 4px 14px rgba(99,102,241,0.45);
  }
  .nav-logo .icon { width: 19px; height: 19px; stroke-width: 2.25; }
  .nav-title { display: flex; flex-direction: column; line-height: 1.15; }
  .nav-title b {
    font-family: var(--font-mono);
    font-size: 0.95rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .nav-title span { font-size: 0.68rem; color: var(--muted-2); letter-spacing: 0.02em; }

  .nav-right { display: flex; align-items: center; gap: var(--space-m); }
  .nav-meta {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .nav-meta b { color: var(--text); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-xs);
    padding: 0.5rem var(--space-m);
    border-radius: var(--radius);
    font-size: 0.875rem;
    font-family: var(--font-body);
    font-weight: 500;
    cursor: pointer;
    transition: background .2s var(--ease), border-color .2s var(--ease), color .2s var(--ease), transform .1s var(--ease), box-shadow .2s var(--ease);
    text-decoration: none;
    border: 1px solid transparent;
    line-height: 1.4;
    white-space: nowrap;
  }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn .icon { width: 16px; height: 16px; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    box-shadow: 0 4px 16px rgba(99,102,241,0.35);
  }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 22px rgba(99,102,241,0.5); }

  .btn-ghost { background: var(--surface-2); color: var(--muted); border-color: var(--border); }
  .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--border-2); background: var(--surface-3); }

  .btn-good {
    background: linear-gradient(135deg, var(--good), #2dd4bf);
    color: #05281d;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(52,211,153,0.3);
  }
  .btn-good:hover:not(:disabled) { box-shadow: 0 6px 22px rgba(52,211,153,0.45); }

  /* ── LAYOUT ── */
  main { max-width: 860px; margin: 0 auto; padding: var(--space-l) var(--space-l) var(--space-xl); }

  /* ── PROGRESS ── */
  .progress-wrap {
    position: sticky;
    top: 63px;
    z-index: 50;
    padding: var(--space-m) 0;
    background: linear-gradient(var(--bg) 70%, transparent);
  }
  .progress-track {
    height: 8px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--good));
    background-size: 200% 100%;
    transition: width .45s var(--ease);
  }
  .progress-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: var(--space-s);
  }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
  }
  .chip .icon { width: 13px; height: 13px; }
  .chip.ok { color: var(--good); border-color: rgba(52,211,153,0.3); background: var(--good-dim); }
  .chip.err { color: var(--bad); border-color: rgba(248,113,113,0.3); background: var(--bad-dim); }

  /* ── QUESTION CARD ── */
  .qcard {
    position: relative;
    background: linear-gradient(180deg, var(--surface), var(--bg-2));
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: var(--space-l);
    box-shadow: var(--shadow);
    animation: cardIn .35s var(--ease);
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .qmeta {
    display: flex;
    align-items: center;
    gap: var(--space-s);
    flex-wrap: wrap;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    color: var(--muted);
    margin-bottom: var(--space-m);
  }
  .topic { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); }
  .topic .icon { width: 14px; height: 14px; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 11px;
    border-radius: 999px;
    background: var(--accent-dim);
    color: var(--accent-2);
    border: 1px solid rgba(99,102,241,0.3);
    font-weight: 600;
  }
  .badge .icon { width: 13px; height: 13px; }
  .badge.multi { background: var(--good-dim); color: var(--good); border-color: rgba(52,211,153,0.3); }

  .reflink {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.74rem; color: var(--muted-2); text-decoration: none;
    transition: color .2s var(--ease);
  }
  .reflink .icon { width: 13px; height: 13px; }
  .reflink:hover { color: var(--accent-2); }

  .copybtn {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-mono); font-size: 0.72rem;
    color: var(--muted); background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 4px 11px; cursor: pointer;
    transition: color .2s var(--ease), border-color .2s var(--ease), background .2s var(--ease);
  }
  .copybtn .icon { width: 13px; height: 13px; }
  .copybtn:hover { color: var(--text); border-color: var(--border-2); background: var(--surface-3); }
  .copybtn.done { color: var(--good); border-color: rgba(52,211,153,0.4); background: var(--good-dim); }
  /* copy button sits before the ref link, which then no longer auto-pushes */
  .qmeta .reflink { margin-left: 0; }

  .qtext {
    font-size: 1.06rem;
    line-height: 1.72;
    margin-bottom: var(--space-l);
    color: #E7EAF3;
  }
  .qtext br { content: ""; display: block; margin-top: var(--space-s); }

  /* ── ANSWERS ── */
  .answers { display: flex; flex-direction: column; gap: 0.625rem; }

  .answer {
    display: flex;
    align-items: flex-start;
    gap: var(--space-m);
    padding: var(--space-m);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color .2s var(--ease), background .2s var(--ease), box-shadow .2s var(--ease);
    text-align: left;
    width: 100%;
    font-family: var(--font-body);
    font-size: 0.94rem;
    color: var(--text);
    line-height: 1.6;
  }
  .answer:hover:not(.locked) { border-color: var(--border-2); background: var(--surface-3); }
  .answer.selected:not(.locked) { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
  .answer.locked { cursor: default; }

  .answer .key {
    flex: 0 0 auto;
    width: 30px; height: 30px;
    display: grid; place-items: center;
    border-radius: 9px;
    border: 1.5px solid var(--border-2);
    font-family: var(--font-mono);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--muted);
    transition: all .2s var(--ease);
  }
  .answer.single .key { border-radius: 50%; }
  .answer.selected .key { background: var(--accent); border-color: var(--accent); color: #fff; }

  .answer.correct { background: var(--good-dim); border-color: var(--good); }
  .answer.correct .key { background: var(--good); border-color: var(--good); color: #05281d; }
  .answer.wrong { background: var(--bad-dim); border-color: var(--bad); }
  .answer.wrong .key { background: var(--bad); border-color: var(--bad); color: #2c0b0b; }

  .answer .atext { flex: 1; }
  .answer .mark {
    flex: 0 0 auto; margin-left: var(--space-s);
    display: grid; place-items: center;
    width: 22px; height: 22px; border-radius: 50%;
    animation: pop .3s var(--ease);
  }
  @keyframes pop { from { transform: scale(0); } 60% { transform: scale(1.2); } to { transform: scale(1); } }
  .answer .mark .icon { width: 16px; height: 16px; stroke-width: 2.75; }
  .answer.correct .mark { color: var(--good); }
  .answer.wrong .mark { color: var(--bad); }

  /* ── ACTIONS ── */
  .qactions {
    display: flex; align-items: center; gap: var(--space-m);
    margin-top: var(--space-l); flex-wrap: wrap;
  }
  .verdict {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--font-mono); font-size: 0.86rem; font-weight: 700;
    padding: 6px 13px; border-radius: 999px;
  }
  .verdict .icon { width: 16px; height: 16px; }
  .verdict.ok { color: var(--good); background: var(--good-dim); }
  .verdict.err { color: var(--bad); background: var(--bad-dim); }
  .hint { font-size: 0.82rem; color: var(--muted); }
  .hint b { color: var(--text); font-family: var(--font-mono); }

  /* ── QNAV ── */
  .qnav {
    display: flex; align-items: center; justify-content: space-between;
    gap: var(--space-m); margin-top: var(--space-l); flex-wrap: wrap;
  }
  .qjump {
    display: flex; align-items: center; gap: var(--space-s);
    font-family: var(--font-mono); font-size: 0.82rem; color: var(--muted);
  }
  .qjump input {
    width: 60px; padding: 6px 8px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font-mono); font-size: 0.82rem; text-align: center;
  }
  .qjump input:focus { border-color: var(--accent); outline: none; }

  .kbd-hint {
    text-align: center; margin-top: var(--space-m);
    font-family: var(--font-mono); font-size: 0.72rem; color: var(--muted-2);
  }
  kbd {
    font-family: var(--font-mono); font-size: 0.7rem;
    background: var(--surface-2); border: 1px solid var(--border);
    border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px; color: var(--muted);
  }

  /* ── LOADING / ERROR ── */
  .state { text-align: center; padding: var(--space-xl) var(--space-l); color: var(--muted); font-family: var(--font-mono); }
  .state.err { color: var(--bad); }
  .state .icon { width: 36px; height: 36px; margin-bottom: var(--space-m); }

  .skeleton { animation: cardIn .3s var(--ease); }
  .sk {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 37%, var(--surface-2) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { from { background-position: 100% 0; } to { background-position: -100% 0; } }

  /* ── SUMMARY ── */
  .summary {
    background: linear-gradient(180deg, var(--surface), var(--bg-2));
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: var(--space-xl) var(--space-l);
    text-align: center;
    box-shadow: var(--shadow);
    animation: cardIn .4s var(--ease);
  }
  .summary h2 { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 800; margin-bottom: var(--space-l); }
  .donut { position: relative; width: 168px; height: 168px; margin: 0 auto var(--space-l); }
  .donut svg { transform: rotate(-90deg); }
  .donut-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .donut-center b { font-family: var(--font-mono); font-size: 2.4rem; font-weight: 800; line-height: 1; }
  .donut-center span { font-size: 0.74rem; color: var(--muted); letter-spacing: 0.05em; margin-top: 4px; }
  .summary-stats {
    display: flex; justify-content: center; gap: var(--space-l);
    flex-wrap: wrap; margin-bottom: var(--space-l);
  }
  .sstat { text-align: center; }
  .sstat b { display: block; font-family: var(--font-mono); font-size: 1.5rem; font-weight: 700; }
  .sstat span { font-size: 0.74rem; color: var(--muted); }
  .sstat.ok b { color: var(--good); }
  .sstat.err b { color: var(--bad); }
  .summary-actions { display: flex; gap: var(--space-s); justify-content: center; flex-wrap: wrap; }

  footer { border-top: 1px solid var(--border); padding: var(--space-l); text-align: center; }
  footer p { font-size: 0.76rem; color: var(--muted-2); font-family: var(--font-mono); }
  footer a { color: var(--accent-2); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    nav { padding: var(--space-s) var(--space-m); }
    .nav-meta { display: none; }
    main { padding: var(--space-m); }
    .qcard, .summary { padding: var(--space-m); }
    .progress-wrap { top: 59px; }
    .qtext { font-size: 1rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>

<script>
const DATA_URL = 'aws_aip_c01.json';
const STORAGE_KEY = 'aip-c01-progress';

let questions = [];
let idx = 0;
let answered = {};

const $ = id => document.getElementById(id);
const app = $('app');
const ico = name => `<svg class="icon"><use href="#${name}"/></svg>`;

/* Source strings contain literal <br/> and HTML entities like &#39;.
   Escape everything (XSS-safe), then restore <br> and decode entities. */
function renderHTML(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/&lt;br\s*\/?&gt;/gi, '<br>')
    .replace(/&amp;#(\d+);/g, (_, n) => '&#' + n + ';')
    .replace(/&amp;([a-z]+);/gi, '&$1;');
}

/* Plain-text version of source strings: decode entities, turn <br/> into newlines. */
function toPlainText(str) {
  if (!str) return '';
  const html = renderHTML(str).replace(/<br\s*\/?>/gi, '\n');
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return (tmp.textContent || '').trim();
}

/* Build a clean prompt with question + options for pasting into an AI. */
function questionToText(q) {
  const multi = isMulti(q);
  const cset = correctSet(q);
  const lines = [];
  lines.push(toPlainText(q.question_text));
  lines.push('');
  Object.keys(q.answers).sort().forEach(k => {
    lines.push(`${k}. ${toPlainText(q.answers[k])}`);
  });
  lines.push('');
  lines.push(multi ? `(Chọn ${cset.size} đáp án)` : '(Chọn một đáp án)');
  lines.push('Hãy chọn đáp án đúng và giải thích ngắn gọn lý do.');
  return lines.join('\n');
}

function isMulti(q) { return (q.answer || '').replace(/[^A-Z]/gi, '').length > 1; }
function correctSet(q) { return new Set((q.answer || '').toUpperCase().replace(/[^A-Z]/g, '').split('')); }

function loadProgress() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    answered = s.answered || {};
    idx = typeof s.idx === 'number' ? s.idx : 0;
  } catch (e) {}
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ answered, idx })); } catch (e) {}
}

function stats() {
  const vals = Object.values(answered);
  return { ok: vals.filter(a => a.correct).length, err: vals.filter(a => !a.correct).length, done: vals.length };
}

function updateProgress() {
  const { ok, err, done } = stats();
  $('progressWrap').hidden = false;
  $('progressFill').style.width = (done / questions.length * 100) + '%';
  $('progressLabel').textContent = `Câu ${idx + 1} / ${questions.length}`;
  $('okCount').textContent = ok;
  $('errCount').textContent = err;
  $('navMeta').innerHTML = `<b>${done}</b>/${questions.length} đã làm · <b>${ok}</b> đúng`;
}

function render() {
  const q = questions[idx];
  if (!q) return;
  const multi = isMulti(q);
  const cset = correctSet(q);
  const prev = answered[idx];
  const keys = Object.keys(q.answers).sort();

  const answersHTML = keys.map(k => {
    let cls = 'answer ' + (multi ? 'multi' : 'single');
    let mark = '';
    if (prev) {
      cls += ' locked';
      if (cset.has(k)) { cls += ' correct'; mark = `<span class="mark">${ico('i-check')}</span>`; }
      else if (prev.picked.includes(k)) { cls += ' wrong'; mark = `<span class="mark">${ico('i-x')}</span>`; }
    }
    return `<button type="button" class="${cls}" data-key="${k}">
      <span class="key">${k}</span>
      <span class="atext">${renderHTML(q.answers[k])}</span>
      ${mark}
    </button>`;
  }).join('');

  const typeBadge = multi
    ? `<span class="badge multi">${ico('i-list')}Chọn ${cset.size} đáp án</span>`
    : `<span class="badge">${ico('i-check-circle')}Một đáp án</span>`;

  app.innerHTML = `
    <div class="qcard">
      <div class="qmeta">
        <span class="topic">${ico('i-layers')}Topic ${q.topic_number} · Câu ${q.question_number}</span>
        ${typeBadge}
        <button type="button" class="copybtn" id="copyBtn">${ico('i-copy')}Copy cho AI</button>
        <a class="reflink" href="${q.link}" target="_blank" rel="noopener">examtopics ${ico('i-external')}</a>
      </div>
      <div class="qtext">${renderHTML(q.question_text)}</div>
      <div class="answers" id="answers">${answersHTML}</div>
      <div class="qactions" id="qactions"></div>
      <div class="qnav">
        <button class="btn btn-ghost" id="prevBtn" ${idx === 0 ? 'disabled' : ''}>${ico('i-prev')}Trước</button>
        <div class="qjump">
          <input type="number" id="jumpInput" min="1" max="${questions.length}" value="${idx + 1}"> / ${questions.length}
        </div>
        <button class="btn btn-ghost" id="nextBtn" ${idx === questions.length - 1 ? 'disabled' : ''}>Sau${ico('i-next')}</button>
      </div>
      <div class="kbd-hint">Mẹo: dùng <kbd>←</kbd> <kbd>→</kbd> để chuyển câu</div>
    </div>
  `;

  const answersEl = $('answers');
  if (!prev) {
    let selected = new Set();
    answersEl.querySelectorAll('.answer').forEach(btn => {
      btn.addEventListener('click', () => {
        const k = btn.dataset.key;
        if (multi) {
          if (selected.has(k)) { selected.delete(k); btn.classList.remove('selected'); }
          else { selected.add(k); btn.classList.add('selected'); }
        } else {
          selected = new Set([k]);
          answersEl.querySelectorAll('.answer').forEach(b => b.classList.toggle('selected', b === btn));
        }
        renderActions(false, selected, multi, cset, q);
      });
    });
    renderActions(false, selected, multi, cset, q);
  } else {
    renderActions(true, new Set(prev.picked), multi, cset, q);
  }

  $('copyBtn').addEventListener('click', () => copyQuestion(q, $('copyBtn')));
  $('prevBtn').addEventListener('click', () => go(-1));
  $('nextBtn').addEventListener('click', () => goNext());
  $('jumpInput').addEventListener('change', e => {
    const n = parseInt(e.target.value, 10);
    if (!isNaN(n) && n >= 1 && n <= questions.length) { idx = n - 1; saveProgress(); render(); updateProgress(); }
  });

  updateProgress();
}

function renderActions(isAnswered, selected, multi, cset, q) {
  const el = $('qactions');
  if (!isAnswered) {
    el.innerHTML = `
      <button class="btn btn-primary" id="checkBtn" ${selected.size === 0 ? 'disabled' : ''}>${ico('i-check')}Kiểm tra</button>
      <span class="hint">${multi ? `Chọn <b>${cset.size}</b> đáp án rồi kiểm tra` : 'Chọn một đáp án'}</span>
    `;
    $('checkBtn').addEventListener('click', () => check(selected, cset, q));
  } else {
    const correct = answered[idx].correct;
    el.innerHTML = `
      <span class="verdict ${correct ? 'ok' : 'err'}">${ico(correct ? 'i-check' : 'i-x')}${correct ? 'Chính xác' : 'Chưa đúng'}</span>
      <span class="hint">Đáp án đúng: <b>${[...cset].sort().join(', ')}</b></span>
      <button class="btn ${correct ? 'btn-good' : 'btn-primary'}" id="contBtn" style="margin-left:auto">
        ${idx === questions.length - 1 ? `${ico('i-award')}Xem kết quả` : `Câu tiếp${ico('i-next')}`}
      </button>
    `;
    $('contBtn').addEventListener('click', () => goNext());
  }
}

function copyQuestion(q, btn) {
  const text = questionToText(q);
  const ok = () => {
    const orig = btn.innerHTML;
    btn.classList.add('done');
    btn.innerHTML = `${ico('i-check')}Đã copy`;
    setTimeout(() => { btn.classList.remove('done'); btn.innerHTML = orig; }, 1800);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(ok).catch(() => fallbackCopy(text, ok));
  } else {
    fallbackCopy(text, ok);
  }
}
function fallbackCopy(text, ok) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); ok(); } catch (e) { alert('Không copy được. Hãy copy thủ công.'); }
  document.body.removeChild(ta);
}

function check(selected, cset, q) {
  const picked = [...selected];
  const correct = picked.length === cset.size && picked.every(k => cset.has(k));
  answered[idx] = { picked, correct };
  saveProgress();
  render();
}

function go(delta) {
  const n = idx + delta;
  if (n >= 0 && n < questions.length) { idx = n; saveProgress(); render(); updateProgress(); }
}
function goNext() {
  if (idx < questions.length - 1) go(1);
  else showSummary();
}

function showSummary() {
  const { ok, err, done } = stats();
  const pct = done ? Math.round(ok / done * 100) : 0;
  const r = 70, c = 2 * Math.PI * r, off = c * (1 - pct / 100);
  const ringColor = pct >= 70 ? 'var(--good)' : pct >= 50 ? 'var(--warn)' : 'var(--bad)';
  app.innerHTML = `
    <div class="summary">
      <h2>${ico('i-award')} Kết quả luyện tập</h2>
      <div class="donut">
        <svg width="168" height="168">
          <circle cx="84" cy="84" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="14"/>
          <circle cx="84" cy="84" r="${r}" fill="none" stroke="${ringColor}" stroke-width="14"
            stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}"
            style="transition:stroke-dashoffset 1s var(--ease)" id="ring"/>
        </svg>
        <div class="donut-center"><b>${pct}<span style="font-size:1.2rem">%</span></b><span>chính xác</span></div>
      </div>
      <div class="summary-stats">
        <div class="sstat ok"><b>${ok}</b><span>đúng</span></div>
        <div class="sstat err"><b>${err}</b><span>sai</span></div>
        <div class="sstat"><b>${questions.length - done}</b><span>chưa làm</span></div>
      </div>
      <div class="summary-actions">
        <button class="btn btn-primary" id="reviewBtn">${ico('i-prev')}Xem lại từ đầu</button>
        <button class="btn btn-ghost" id="restartBtn">${ico('i-refresh')}Làm lại từ đầu</button>
      </div>
    </div>
  `;
  $('progressFill').style.width = '100%';
  requestAnimationFrame(() => { const ring = $('ring'); if (ring) ring.style.strokeDashoffset = off; });
  $('reviewBtn').addEventListener('click', () => { idx = 0; saveProgress(); render(); });
  $('restartBtn').addEventListener('click', resetAll);
}

function resetAll() {
  if (!confirm('Xóa toàn bộ tiến trình và làm lại từ đầu?')) return;
  answered = {}; idx = 0;
  localStorage.removeItem(STORAGE_KEY);
  render(); updateProgress();
}

$('resetBtn').addEventListener('click', resetAll);

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') { const b = $('nextBtn'); if (b && !b.disabled) b.click(); }
  if (e.key === 'ArrowLeft') { const b = $('prevBtn'); if (b && !b.disabled) b.click(); }
});

fetch(DATA_URL)
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    questions = data.filter(q => q && q.answers && q.question_text);
    if (!questions.length) throw new Error('Không có câu hỏi nào');
    loadProgress();
    if (idx >= questions.length) idx = 0;
    render();
    updateProgress();
  })
  .catch(err => {
    app.innerHTML = `<div class="state err">${ico('i-alert')}<br>Không tải được dữ liệu câu hỏi.<br>${err.message}<br><br>
      Hãy mở trang qua một web server (vd: <kbd>npx serve</kbd>) thay vì mở file trực tiếp.</div>`;
    $('navMeta').textContent = 'Lỗi tải dữ liệu';
  });
</script>

</body>
</html>
